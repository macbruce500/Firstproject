<!DOCTYPE html>
<html lang="en">
<head>
    <title>My First GitHub Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            color: #38bdf8;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #38bdf8;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>

<body>

<h1>Welcome to My Website</h1>
<p>This is my first project using Git and GitHub.</p>

<button onclick="changeText()">Click Me</button>

<p id="message"></p>

<script>
function changeText() {
    document.getElementById("message").innerHTML = "You just changed the page!";
}
</script>


</body>
</html>
